<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vocabulary Practice PDF Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 2em;
      background: #f0f0f0;
    }
    h1 {
      color: #333;
    }
    a {
      display: inline-block;
      margin: 1em 0;
      padding: 0.6em 1.2em;
      background-color: #007BFF;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }
    a:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <h1>Download Vocabulary Practice PDFs</h1>
  <a href="#" id="englishBtn">Download English Practice PDF</a><br>
  <a href="#" id="portugueseBtn">Download Brazilian Portuguese Practice PDF</a>

  <!-- jsPDF & Autotable -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

  <!-- Load your word list data -->
  <script src="./wordList.js"></script>

  <script>
    // Merge all lists from wordList.js

    // English Practice PDF
    document.getElementById("englishBtn").addEventListener("click", () => {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      doc.setFontSize(16);
      doc.text("English Practice Sheet", 14, 20);

      const englishTable = allWords.map(([en]) => [en, "__________"]);

      doc.autoTable({
        head: [["English", "Your Translation"]],
        body: englishTable,
        startY: 30
      });

      doc.save("english_practice.pdf");
    });

    // Brazilian Portuguese practice PDF
    document.getElementById("portugueseBtn").addEventListener("click", () => {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      doc.setFontSize(16);
      doc.text("Brazilian Portuguese Practice Sheet", 14, 20);

      const portugueseTable = allWords.map(([_, pt]) => [pt, "__________"]);

      doc.autoTable({
        head: [["Português (Brasil)", "Sua tradução"]],
        body: portugueseTable,
        startY: 30
      });

      doc.save("brazilian_portuguese_practice.pdf");
    });
  </script>
</body>
</html>
